name: CI

on:
  push:
    branches:
      - master
      - "claude/**"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Gradle build (check includes tests + ktlint)
        run: ./gradlew clean check --no-daemon
